<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>YT Channel Volume — Settings</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
  font-size: 14px;
  color: #e1e1e1;
  background: #0f0f23;
  min-height: 100vh;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 32px 24px;
}

h1 {
  font-size: 20px;
  font-weight: 600;
  color: #4ecdc4;
  margin-bottom: 28px;
  letter-spacing: 0.5px;
}

/* ── Section ──────────────────────────────────── */

.section {
  background: #1a1a2e;
  border-radius: 10px;
  padding: 20px 24px;
  margin-bottom: 20px;
}
.section h2 {
  font-size: 12px;
  font-weight: 600;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

/* ── Settings rows ────────────────────────────── */

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #2a2a4a;
}
.setting-row:last-child { border-bottom: none; }

.setting-row .setting-label {
  font-size: 13px;
  color: #ccc;
}
.setting-row .setting-desc {
  font-size: 11px;
  color: #666;
  margin-top: 2px;
}

.setting-row input[type="range"] {
  width: 180px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #2a2a4a;
  border-radius: 2px;
  outline: none;
}
.setting-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #4ecdc4;
  cursor: pointer;
  border: 2px solid #1a1a2e;
}

.setting-value {
  min-width: 65px;
  text-align: right;
  font-size: 14px;
  font-weight: 700;
  color: #4ecdc4;
  font-variant-numeric: tabular-nums;
  margin-left: 10px;
}

/* ── Toggle button ────────────────────────────── */

.toggle-group {
  display: flex;
  gap: 0;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid #2a2a4a;
}
.toggle-group button {
  padding: 6px 16px;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  background: #16213e;
  border: none;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.toggle-group button.active {
  background: #4ecdc4;
  color: #1a1a2e;
}
.toggle-group button:hover:not(.active) {
  color: #ccc;
}

/* ── Saved channels table ─────────────────────── */

.channel-table {
  width: 100%;
  border-collapse: collapse;
}
.channel-table th {
  font-size: 10px;
  font-weight: 600;
  color: #666;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  text-align: left;
  padding: 8px 0;
  border-bottom: 1px solid #2a2a4a;
}
.channel-table th:last-child {
  text-align: right;
  width: 40px;
}
.channel-table td {
  padding: 10px 0;
  border-bottom: 1px solid #1a1a2e;
  font-size: 13px;
}
.channel-table tr:last-child td { border-bottom: none; }

.ch-name {
  color: #e1e1e1;
  max-width: 300px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ch-link {
  color: #4ecdc4;
  text-decoration: none;
  transition: opacity 0.15s;
}
.ch-link:hover {
  opacity: 0.8;
  text-decoration: underline;
}
.ch-vol {
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #ff6b9d;
  text-align: right;
  padding-right: 12px;
}
.ch-del {
  background: none;
  border: none;
  color: #555;
  cursor: pointer;
  font-size: 16px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.ch-del:hover {
  color: #ff6b9d;
  background: #2a2a4a;
}

.clear-all-btn {
  font-size: 11px;
  color: #888;
  background: none;
  border: 1px solid #2a2a4a;
  border-radius: 4px;
  padding: 4px 10px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.clear-all-btn:hover {
  color: #ff6b9d;
  border-color: #ff6b9d;
}

.empty-msg {
  color: #555;
  font-size: 13px;
  padding: 12px 0;
}
.toggle-switch {
  position: relative;
  width: 36px;
  height: 20px;
  flex-shrink: 0;
}
.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-switch .slider {
  position: absolute;
  inset: 0;
  background: #2a2a4a;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-switch .slider::before {
  content: '';
  position: absolute;
  width: 14px;
  height: 14px;
  left: 3px;
  top: 3px;
  background: #888;
  border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.toggle-switch input:checked + .slider {
  background: #1b3a4b;
}
.toggle-switch input:checked + .slider::before {
  transform: translateX(16px);
  background: #4ecdc4;
}
</style>
</head>
<body>
<div class="container">
  <h1>YT Channel Volume</h1>

  <div class="section">
    <h2 data-i18n="settings"></h2>

    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="targetLufs"></div>
        <div class="setting-desc" data-i18n="targetLufsDesc"></div>
      </div>
      <div style="display:flex; align-items:center;">
        <input type="range" id="targetSlider" min="-30" max="-6" value="-18" step="1">
        <span id="targetValue" class="setting-value">-18 LUFS</span>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="displayUnit"></div>
        <div class="setting-desc" data-i18n="displayUnitDesc"></div>
      </div>
      <div class="toggle-group" id="unitToggle">
        <button data-unit="%" class="active">%</button>
        <button data-unit="dB">dB</button>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-label" data-i18n="showGainOverlay"></div>
        <div class="setting-desc" data-i18n="showGainOverlayDesc"></div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="overlayToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="section">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <h2 data-i18n="savedChannels" style="margin-bottom:0"></h2>
      <button id="clearAllBtn" class="clear-all-btn" data-i18n="clearAll"></button>
    </div>
    <div id="channelList"></div>
  </div>
</div>

<script src="utils.js"></script>
<script src="options.js"></script>
</body>
</html>
