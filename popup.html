<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 320px;
  font-family: 'Segoe UI', 'Yu Gothic UI', sans-serif;
  font-size: 13px;
  color: #e1e1e1;
  background: #1a1a2e;
}

.header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid #2a2a4a;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  color: #4ecdc4;
  letter-spacing: 0.5px;
}
.settings-link {
  font-size: 16px;
  color: #666;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  transition: color 0.15s;
}
.settings-link:hover { color: #4ecdc4; }

.type-badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
  flex-shrink: 0;
}
.type-badge.live { background: #e74c3c; color: #fff; }
.type-badge.video { background: #2a2a4a; color: #aaa; }

/* ── Current video info ────────────────────────── */

.info-section {
  padding: 12px 16px;
  background: #16213e;
  border-bottom: 1px solid #2a2a4a;
}
.channel-name {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
}
.channel-name.empty {
  color: #666;
  font-weight: 400;
}

.loudness-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 5px;
  margin-bottom: 10px;
}
.loudness-card {
  background: #1a1a2e;
  border-radius: 6px;
  padding: 7px 8px;
}
.loudness-card .label {
  font-size: 9px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.loudness-card .value {
  font-size: 17px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #4ecdc4;
  margin-top: 2px;
}
.loudness-card .value.suggested { color: #f9ca24; }
.loudness-card .value.current { color: #ff6b9d; }
.loudness-card .value.unknown { color: #555; font-size: 13px; }
.loudness-card .unit {
  font-size: 10px;
  font-weight: 400;
  color: #888;
  margin-left: 1px;
}

/* ── Apply button ──────────────────────────────── */

.apply-section {
  padding: 10px 16px;
  border-bottom: 1px solid #2a2a4a;
  display: flex;
  align-items: center;
  gap: 8px;
}
.apply-btn {
  flex: 1;
  padding: 8px 0;
  font-size: 12px;
  font-weight: 700;
  color: #1a1a2e;
  background: #4ecdc4;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.15s;
}
.apply-btn:hover { opacity: 0.85; }
.apply-btn:disabled {
  background: #2a2a4a;
  color: #555;
  cursor: default;
  opacity: 1;
}
.apply-hint {
  font-size: 10px;
  color: #666;
  line-height: 1.3;
  max-width: 140px;
}

/* ── Manual volume slider ──────────────────────── */

.manual-section {
  padding: 10px 16px;
}
.manual-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.manual-header .label {
  font-size: 11px;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.slider-row input[type="range"] {
  flex: 1;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: #2a2a4a;
  border-radius: 3px;
  outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #ff6b9d;
  cursor: pointer;
  border: 2px solid #1a1a2e;
}
.slider-value {
  min-width: 42px;
  text-align: right;
  font-size: 14px;
  font-weight: 700;
  color: #ff6b9d;
  font-variant-numeric: tabular-nums;
}

.presets {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}
.presets button {
  flex: 1;
  padding: 4px 0;
  font-size: 11px;
  font-weight: 600;
  color: #aaa;
  background: #2a2a4a;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.presets button:hover {
  background: #ff6b9d;
  color: #fff;
}

.status-msg {
  padding: 20px 16px;
  text-align: center;
  color: #555;
}
</style>
</head>
<body>
<div class="header">
  <h1>YT Channel Volume</h1>
  <button id="settingsBtn" class="settings-link" title="Settings">&#9881;</button>
</div>

<div id="main">
  <div class="info-section">
    <div style="display:flex; align-items:center; gap:6px; margin-bottom:8px;">
      <div id="channelName" class="channel-name empty" style="margin-bottom:0" data-i18n="channelNotDetected"></div>
      <span id="videoTypeBadge" class="type-badge" style="display:none"></span>
    </div>
    <div class="loudness-grid">
      <div class="loudness-card">
        <div class="label" data-i18n="labelLoudness"></div>
        <div id="contentLufs" class="value unknown">---</div>
      </div>
      <div class="loudness-card">
        <div class="label" data-i18n="labelSuggested"></div>
        <div id="suggestedVol" class="value suggested unknown">---</div>
      </div>
      <div class="loudness-card">
        <div class="label" data-i18n="labelCurrent"></div>
        <div id="currentVol" class="value current unknown">---</div>
      </div>
    </div>
  </div>

  <div class="apply-section">
    <button id="applyBtn" class="apply-btn" disabled data-i18n="applyToChannel"></button>
    <span id="applyHint" class="apply-hint" data-i18n="hintNoLoudness"></span>
  </div>

  <div class="manual-section">
    <div class="manual-header">
      <span class="label" data-i18n="manualVolume"></span>
    </div>
    <div class="slider-row">
      <input type="range" id="volumeSlider" min="0" max="600" value="100" step="5">
      <span id="volumeValue" class="slider-value">100%</span>
    </div>
    <div class="presets">
      <button data-vol="0">0%</button>
      <button data-vol="50">50%</button>
      <button data-vol="100">100%</button>
      <button data-vol="200">200%</button>
      <button data-vol="400">400%</button>
      <button data-vol="600">MAX</button>
    </div>
  </div>
</div>

<div id="notWatch" class="status-msg" style="display:none;" data-i18n="openOnVideoPage">
</div>

<div id="notYt" class="status-msg" style="display:none;" data-i18n="openOnYoutube">
</div>

<script src="utils.js"></script>
<script src="popup.js"></script>
</body>
</html>
